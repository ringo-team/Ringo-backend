services:
  springboot:
    image: jaeyunchung26/ringo-app:1.9
    container_name: ringo-app
    ports:
      - "8080:8080"
    restart: always
    networks:
      - ringo-network
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ringo_mysql?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

  mysql:
    image: mysql:8.0
    container_name: Ringo-database
    restart: always
    environment:
      MYSQL_DATABASE: ringo_mysql
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ringo-network

  redis:
    image: redis:6.2.6-alpine
    container_name: Ringo-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ringo-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - ringo-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - ringo-network
    depends_on:
      - prometheus

networks:
  ringo-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: